name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Mac DMG
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Find NDK
        id: ndk
        run: |
          NDK_DIR=$(ls -d $ANDROID_HOME/ndk/*/ 2>/dev/null | head -1 | sed 's:/$::')
          echo "NDK_HOME=$NDK_DIR" >> $GITHUB_ENV
          echo "Found NDK: $NDK_DIR"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Init Android project
        run: cargo tauri android init

      - name: Generate signing key
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias flash-idea -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass flash-idea -keypass flash-idea \
            -dname "CN=Flash Idea, O=Flash Idea, L=Unknown, ST=Unknown, C=CN"

      - name: Build Android APK (release)
        run: cargo tauri android build --apk --target aarch64
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: flash-idea
          SIGNING_KEY_ALIAS: flash-idea
          SIGNING_KEY_PASSWORD: flash-idea

      - name: Rename APK
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          cp "$APK" "Flash-Idea_${VERSION}_arm64.apk"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Flash-Idea_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

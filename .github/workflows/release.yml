name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build Mac DMG
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Init Android project
        run: cargo tauri android init

      - name: Build Android APK
        run: cargo tauri android build --apk --debug --target aarch64
        env:
          NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973

      - name: Rename APK
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          cp "$APK" "FlashIdea_${VERSION}_arm64.apk"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: FlashIdea_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
